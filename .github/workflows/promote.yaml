
name: Promote Charm

on:
  workflow_dispatch:
    inputs:
      promotion:
        type: choice
        description: Channel to promote from
        options:
          - edge -> beta
          - beta -> candidate
          - candidate -> stable

jobs:
  promote:
    name: Promote
    uses: canonical/observability/.github/workflows/charm-promote.yaml@3ab21836827cbc54bd7ea8e4e949300381ad658d # v2
    with:
      promotion: ${{ github.event.inputs.promotion }}
    secrets: inherit