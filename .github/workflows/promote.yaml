
name: Promote Charm

on:
  workflow_dispatch:
    inputs:
      promotion:
        type: choice
        description: Channel to promote from
        options:
          - edge -> beta
          - beta -> candidate
          - candidate -> stable

jobs:
  promote:
    name: Promote
    uses: canonical/observability/.github/workflows/charm-promote.yaml@aa79726b37701487e0808ededd44e9af48651e51 # v1
    with:
      promotion: ${{ github.event.inputs.promotion }}
    secrets: inherit