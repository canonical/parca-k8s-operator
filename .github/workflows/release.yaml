name: Release to latest/edge

on:
  push:
    branches:
      - main

permissions:
  # Required for CodeQL security scanning
  security-events: write
  # Required for private repositories
  actions: read
  # Write permission needed for the reusable workflow to push git tags
  contents: write

jobs:
  release:
    uses: canonical/observability/.github/workflows/charm-release.yaml@dd6c66dc595da864fcc880464f9d7526aa2d6b2b # v1
    secrets: inherit
    with:
      default-track: 2
